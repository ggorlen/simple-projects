<p>type the letter to get a point, wrong letter loses a point</p>
<h1></h1>
<div>score: <span>0</span></div>
<script>

function randomLetter () {
  return String.fromCharCode(Math.floor(Math.random() * 26) + 97);
}

let score = 0;
let currentLetter = "";

setInterval(() => {
  currentLetter = randomLetter()
  document.querySelector("h1").setHTML(currentLetter);
}, 1000);

document.addEventListener("keydown", event => {
  if (event.key === currentLetter) {
    score++;
    currentLetter = "";
    document.querySelector("span").setHTML(score);
  }
  else {
    score--;
    document.querySelector("span").setHTML(score);
  }
});
</script>
